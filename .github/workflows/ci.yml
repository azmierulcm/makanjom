name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Type-check & Test
    runs-on: ubuntu-latest
    env:
      # Suppress Node.js 20 deprecation warnings from action runners.
      # Remove once actions/checkout and actions/setup-node ship Node 24 builds.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # npm ci fails when the lockfile is missing Linux-specific optional
        # packages (e.g. @emnapi/runtime needed by @next/swc on Linux).
        # The lockfile is generated on macOS so those entries are absent.
        # npm install resolves platform-specific deps on the fly.
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --ci --passWithNoTests
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}
          NEXT_PUBLIC_SITE_URL: https://makanjom.com
